syntax = "proto3";

package diffy.v1;

service DemoService {
  rpc GetGreeting(GetGreetingRequest) returns (GetGreetingResponse);
}

message GetGreetingRequest {
  string name = 1;
  int32 attempt = 2;
}

message GetGreetingResponse {
  string message = 1;
  string served_by = 2;
  int64 generated_at_unix_ms = 3;
}
